<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Binance Auto Trader 대시보드</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background: radial-gradient(circle at top, #111827 0, #020617 55%); }
    .glass-card { background: rgba(15, 23, 42, 0.92); backdrop-filter: blur(18px); border: 1px solid rgba(148, 163, 184, 0.2); }
    .metric-label { font-size: 0.78rem; letter-spacing: 0.08em; }
  </style>
</head>
<body class="min-h-screen text-slate-100">
  <div class="max-w-6xl mx-auto px-4 py-6 md:py-10">

    <header class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">
      <div>
        <h1 class="text-2xl md:text-3xl font-semibold tracking-tight text-white">
          Binance Auto Trader 대시보드
        </h1>
        <p class="text-sm md:text-base text-slate-400 mt-1">
          성과 + 진입 품질 + “왜 진입이 막혔는지(SKIP)”까지 분석합니다.
        </p>
      </div>
      <div class="flex flex-col items-start md:items-end gap-1 text-xs md:text-sm text-slate-400">
        <span id="last-updated-label">마지막 업데이트: -</span>
        <button id="refresh-btn"
          class="inline-flex items-center gap-1 rounded-full bg-slate-800/70 hover:bg-slate-700 px-3 py-1.5 text-xs font-medium text-slate-100 border border-slate-600/60">
          <span>새로고침</span>
        </button>
      </div>
    </header>

    <section class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 mb-6">
      <div class="glass-card rounded-2xl p-3 md:p-4 shadow-lg">
        <div class="metric-label text-slate-400 uppercase mb-1">총 거래 횟수</div>
        <div id="summary-total-trades" class="text-xl md:text-2xl font-semibold text-white">-</div>
      </div>

      <div class="glass-card rounded-2xl p-3 md:p-4 shadow-lg">
        <div class="metric-label text-slate-400 uppercase mb-1">승률</div>
        <div id="summary-win-rate" class="text-xl md:text-2xl font-semibold text-emerald-400">-</div>
        <div id="summary-win-loss" class="text-xs md:text-sm text-slate-400 mt-1">-</div>
      </div>

      <div class="glass-card rounded-2xl p-3 md:p-4 shadow-lg">
        <div class="metric-label text-slate-400 uppercase mb-1">총 수익(USDT)</div>
        <div id="summary-total-pnl" class="text-xl md:text-2xl font-semibold">-</div>
      </div>

      <div class="glass-card rounded-2xl p-3 md:p-4 shadow-lg">
        <div class="metric-label text-slate-400 uppercase mb-1">거래당 평균 수익</div>
        <div id="summary-avg-pnl" class="text-xl md:text-2xl font-semibold text-white">-</div>
      </div>
    </section>

    <section class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
      <div class="glass-card rounded-2xl p-4 shadow-lg">
        <div class="flex items-center justify-between mb-2">
          <h2 class="text-sm md:text-base font-semibold text-white">최근 30일 일별 손익</h2>
          <span class="text-xs text-slate-400">USDT</span>
        </div>
        <div class="h-48 md:h-60">
          <canvas id="dailyPnlChart"></canvas>
        </div>
      </div>

      <div class="glass-card rounded-2xl p-4 shadow-lg">
        <div class="flex items-center justify-between mb-2">
          <h2 class="text-sm md:text-base font-semibold text-white">최근 진입 점수 분포</h2>
          <span class="text-xs text-slate-400">EntryScore</span>
        </div>
        <div class="h-48 md:h-60">
          <canvas id="entryScoreHistChart"></canvas>
        </div>
        <div class="mt-2 text-xs text-slate-400">
          운영 데이터가 아직 적으면 비어 있을 수 있습니다. (필요 시 API에 include_test=true 사용)
        </div>
      </div>
    </section>

    <!-- SKIP 분석 -->
    <section class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-10">
      <div class="glass-card rounded-2xl p-4 shadow-lg">
        <div class="flex items-center justify-between mb-2">
          <h2 class="text-sm md:text-base font-semibold text-white">SKIP 원인 TOP</h2>
          <span class="text-xs text-slate-400">최근 7일</span>
        </div>
        <div id="skipReasonsBox" class="text-xs md:text-sm text-slate-200 space-y-2"></div>
      </div>

      <div class="glass-card rounded-2xl p-4 shadow-lg">
        <div class="flex items-center justify-between mb-2">
          <h2 class="text-sm md:text-base font-semibold text-white">시간대별 SKIP 횟수(KST)</h2>
          <span class="text-xs text-slate-400">최근 7일</span>
        </div>
        <div class="h-48 md:h-60">
          <canvas id="skipHourlyChart"></canvas>
        </div>
      </div>
    </section>
  </div>

  <script>
    const fmtNumber = (v, digits = 2) => {
      const num = Number(v);
      if (Number.isNaN(num)) return "-";
      return num.toLocaleString("en-US", { minimumFractionDigits: digits, maximumFractionDigits: digits });
    };
    const fmtPnlWithSign = (v, digits = 2) => {
      const num = Number(v);
      if (Number.isNaN(num)) return "-";
      const s = num.toLocaleString("en-US", { minimumFractionDigits: digits, maximumFractionDigits: digits });
      return num > 0 ? `+${s}` : s;
    };
    const setLastUpdated = () => {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");
      const hh = String(now.getHours()).padStart(2, "0");
      const mi = String(now.getMinutes()).padStart(2, "0");
      document.getElementById("last-updated-label").textContent = `마지막 업데이트: ${yyyy}-${mm}-${dd} ${hh}:${mi}`;
    };

    let dailyPnlChart = null;
    let entryScoreHistChart = null;
    let skipHourlyChart = null;

    async function loadSummary() {
      const res = await fetch("/api/summary");
      if (!res.ok) return;
      const data = await res.json();

      document.getElementById("summary-total-trades").textContent = fmtNumber(data.total_trades, 0);
      document.getElementById("summary-win-rate").textContent = fmtNumber(data.win_rate_pct, 1) + "%";
      document.getElementById("summary-win-loss").textContent =
        `이긴 ${fmtNumber(data.wins,0)} / 진 ${fmtNumber(data.losses,0)} / 본전 ${fmtNumber(data.breakevens,0)}`;

      const totalPnlElem = document.getElementById("summary-total-pnl");
      const totalPnl = Number(data.total_pnl_usdt || 0);
      totalPnlElem.textContent = fmtPnlWithSign(totalPnl, 2);
      totalPnlElem.className = "text-xl md:text-2xl font-semibold " + (totalPnl > 0 ? "text-emerald-400" : totalPnl < 0 ? "text-rose-400" : "text-slate-300");

      document.getElementById("summary-avg-pnl").textContent = fmtPnlWithSign(Number(data.avg_pnl_usdt || 0), 2);
    }

    async function loadDailyPnlChart() {
      const res = await fetch("/api/daily-pnl?days=30");
      if (!res.ok) return;
      const data = await res.json();
      const items = data.items || [];

      const labels = items.map(x => x.date);
      const pnls = items.map(x => Number(x.pnl_usdt || 0));

      const ctx = document.getElementById("dailyPnlChart").getContext("2d");
      if (dailyPnlChart) dailyPnlChart.destroy();

      dailyPnlChart = new Chart(ctx, {
        type: "line",
        data: { labels, datasets: [{ label: "Daily PnL", data: pnls, borderWidth: 2, tension: 0.3, fill: true }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
      });
    }

    async function loadEntryScoreHist() {
      const res = await fetch("/api/entry-scores/recent?limit=300");
      if (!res.ok) return;
      const data = await res.json();

      const labels = data.hist_labels || [];
      const counts = data.hist_counts || [];

      const ctx = document.getElementById("entryScoreHistChart").getContext("2d");
      if (entryScoreHistChart) entryScoreHistChart.destroy();

      entryScoreHistChart = new Chart(ctx, {
        type: "bar",
        data: { labels, datasets: [{ label: "count", data: counts, borderWidth: 1 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
      });
    }

    async function loadSkipReasons() {
      const res = await fetch("/api/events/skip-reasons?days=7&limit=15");
      if (!res.ok) return;
      const data = await res.json();
      const items = data.items || [];

      const box = document.getElementById("skipReasonsBox");
      box.innerHTML = "";

      for (const it of items) {
        const div = document.createElement("div");
        div.className = "flex justify-between border-b border-slate-800/60 pb-1";
        div.innerHTML = `<span class="truncate max-w-[70%]">${it.reason}</span><span>${it.n}</span>`;
        box.appendChild(div);
      }
    }

    async function loadSkipHourly() {
      const res = await fetch("/api/events/skip-hourly?days=7");
      if (!res.ok) return;
      const data = await res.json();
      const items = data.items || [];

      const labels = items.map(x => String(x.hour_kst));
      const vals = items.map(x => Number(x.n || 0));

      const ctx = document.getElementById("skipHourlyChart").getContext("2d");
      if (skipHourlyChart) skipHourlyChart.destroy();

      skipHourlyChart = new Chart(ctx, {
        type: "bar",
        data: { labels, datasets: [{ label: "skip_count", data: vals, borderWidth: 1 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
      });
    }

    async function loadAll() {
      await Promise.all([
        loadSummary(),
        loadDailyPnlChart(),
        loadEntryScoreHist(),
        loadSkipReasons(),
        loadSkipHourly(),
      ]);
      setLastUpdated();
    }

    window.addEventListener("DOMContentLoaded", () => {
      loadAll();
      document.getElementById("refresh-btn").addEventListener("click", () => loadAll());
    });
  </script>
</body>
</html>
